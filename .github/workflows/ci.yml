name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-safety:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run coverage gate
        run: npm run test:coverage

      - name: Run safety regression suite
        run: npm run test:safety
